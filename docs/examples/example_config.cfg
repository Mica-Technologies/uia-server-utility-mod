# Configuration file

roadrunner {
    # List of block-to-speed-multiplier mappings. Each entry is in the format 'blockRegistryName=multiplier',
    # where multiplier is a decimal number representing the speed boost factor (e.g. 1.5 = 50% faster).
    # Both vanilla and modded blocks are supported. There is no limit on the number of entries.
    # A multiplier of 1.0 = normal speed, 1.5 = 50% faster, 2.0 = double speed, etc.
    S:speedBlocks <
        furenikusroads:sidewalk_clean=1.3
        furenikusroads:sidewalk=1.3
        furenikusroads:sidewalk_dark=1.3
        furenikusroads:road_block_standard=1.6
        furenikusroads:road_block_fine=1.6
     >
}


roamer {
    # List of block registry names (e.g. minecraft:grass, minecraft:stone) that roamer NPCs are allowed to walk on.
    S:walkableBlocks <
        minecraft:grass
        minecraft:planks
        minecraft:brick_block
        minecraft:concrete
        furenikusroads:sidewalk_clean
        furenikusroads:sidewalk
        furenikusroads:sidewalk_dark
     >
}


